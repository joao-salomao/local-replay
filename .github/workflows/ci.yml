name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      # The integration tests shell out to ffmpeg/ffprobe (real clip processing)
      # and openssl (self-signed cert generation).
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bunx tsc --noEmit

      - name: Format check
        run: bun run format:check

      # Runs the same unit + integration suite as `bun run test`, but with coverage collection
      # on: bunfig.toml's `coverageThreshold = { lines = 1, functions = 1 }` makes this step fail
      # the moment coverage of any measured src/ file drops below 100%, so a change that adds
      # uncovered code (or deletes a test) fails CI here instead of silently regressing.
      - name: Unit + integration tests (with 100% coverage gate)
        run: bun run test:coverage

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      # The e2e webServer boots the real server, which shells out to ffmpeg (clip
      # processing) and openssl (self-signed cert). ffmpeg isn't preinstalled on the runner.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Chromium + its system libraries. The specs drive it headless with a fake
      # media device (--use-fake-device-for-media-stream), which works on Linux CI
      # (unlike the sandboxed macOS dev box, where getUserMedia hangs).
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Builds the production image exactly as `start.sh` does. This catches
      # container-only regressions the unit/integration suite can't — e.g. a runtime
      # file the Dockerfile forgets to COPY (tsconfig.json, which Bun needs to resolve
      # the @server/@shared/@web path aliases): the app boots fine in dev but fails in
      # the image with "Cannot find module @shared/...".
      - name: Build image
        run: docker build -t local-replay:ci .

      - name: Boot the container and smoke-test it
        run: |
          docker run --rm -d -p 8443:8443 -e HOST_LAN_IP=127.0.0.1 --name lr-ci local-replay:ci
          # Wait for the server to generate its cert and start serving.
          for _ in $(seq 1 30); do
            if curl -fsk https://localhost:8443/ >/dev/null 2>&1; then break; fi
            sleep 1
          done
          echo "----- container logs -----"
          docker logs lr-ci || true
          echo "--------------------------"
          ok=1
          if ! curl -fsk https://localhost:8443/ | grep -q "Local Replay"; then
            echo "::error::root did not serve the app"; ok=0
          fi
          if docker logs lr-ci 2>&1 | grep -qi "cannot find module"; then
            echo "::error::module-resolution failure in the container (missing runtime file?)"; ok=0
          fi
          docker rm -f lr-ci >/dev/null 2>&1 || true
          if [ "$ok" -ne 1 ]; then exit 1; fi
          echo "Docker smoke test passed."
