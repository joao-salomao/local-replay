<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <!-- "Add to Home Screen" runs the camera page standalone (no Safari chrome) — the closest thing
       to fullscreen the iPhone offers, since iOS has no element Fullscreen API. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Local Replay" />
  <title>Câmera — Local Replay</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="page">
    <h1>📷 Câmera</h1>
    <div class="banner" id="hidden-banner" hidden>⚠️ A tela ficou oculta — buffer reiniciado. Mantenha esta página aberta e o celular na tomada.</div>
    <div class="card" id="setup">
      <label class="field-label" for="angle-name">Nome do ângulo</label>
      <input id="angle-name" placeholder="Nome do ângulo (ex: Fundo)" />
      <button type="button" id="start" class="btn-lg">Iniciar câmera</button>
      <div class="error" id="camera-error"></div>
    </div>
    <div class="card" id="live" hidden>
      <div class="video-stage">
        <video id="preview" autoplay muted playsinline></video>
        <p class="muted orient-hint" id="orient-hint" hidden>↔️ Vire o celular para a horizontal</p>
        <button type="button" id="fullscreen-toggle" class="fs-toggle">⛶ Tela cheia</button>
      </div>
      <p class="muted" id="fs-hint" hidden>
        📱 No iPhone, para tela cheia sem a barra do Safari: <strong>Compartilhar → Adicionar à Tela
        de Início</strong> e abra o app pelo ícone.
      </p>
      <select id="camera-select" hidden></select>
      <div class="status-panel">
        <p class="row"><span class="status-dot" id="conn-dot"></span><span id="conn-text">Desconectado</span></p>
        <p class="muted" id="media-info"></p>
        <p id="buffer-status" class="muted"></p>
        <p class="error" id="upload-error"></p>
      </div>
    </div>
  </div>
  <script type="module" src="/assets/camera.js"></script>
</body>
</html>
