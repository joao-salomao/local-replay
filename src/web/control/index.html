<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Controle — Local Replay</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="page page--wide">
    <h1>🔴 Controle</h1>
    <div class="banner" id="disk-banner" hidden></div>
    <div class="control-grid">
      <div class="card card-record">
        <button type="button" id="record" class="record-btn danger" disabled>GRAVAR</button>
        <div class="error" id="record-error"></div>
        <p class="row"><span class="status-dot" id="conn-dot"></span><span id="cam-count">0 câmera(s) online</span></p>
        <p class="muted" id="cam-hint" hidden>Nenhuma câmera online — abra /camera em um celular</p>
        <ul id="cam-list" class="muted cam-list"></ul>
      </div>
      <div class="card card-duration">
        <p class="muted">Duração do clipe</p>
        <div class="seg" id="durations"></div>
        <p class="muted">Áudio do vídeo combinado</p>
        <select id="audio-source" aria-label="Câmera de áudio do vídeo combinado"></select>
        <p class="muted">Resolução / FPS de captura</p>
        <select id="capture-preset" aria-label="Resolução e FPS de captura das câmeras"></select>
        <div class="field-row">
          <div class="field">
            <p class="muted">Buffer extra (s) <button type="button" class="hint" aria-describedby="tip-buffer">i<span class="hint-tip" role="tooltip" id="tip-buffer">Segundos que cada câmera mantém no buffer ALÉM da duração do clipe. Essa folga deixa o servidor recuperar as micro‑falhas entre ciclos de gravação (evita clipes curtos, ex.: 9,6s num pedido de 10s). Esses segundos extras nunca entram no clipe final — e não ajudam se o upload estiver lento.</span></button></p>
            <input type="number" id="buffer-margin" min="0" max="60" step="1" inputmode="numeric" aria-label="Buffer extra da câmera em segundos" />
          </div>
          <div class="field">
            <p class="muted">Espera de upload (s) <button type="button" class="hint" aria-describedby="tip-upload">i<span class="hint-tip" role="tooltip" id="tip-upload">Quanto tempo o servidor espera as câmeras terminarem de enviar o lance antes de fechá‑lo com o que já chegou. Aumente para Wi‑Fi lento ou instável, para uma câmera atrasada não ficar de fora. É este ajuste (e não o buffer extra) que resolve upload lento.</span></button></p>
            <input type="number" id="upload-timeout" min="10" max="300" step="1" inputmode="numeric" aria-label="Espera de upload do servidor em segundos" />
          </div>
        </div>
      </div>
      <div class="card card-jobs">
        <p class="muted">Últimos lances</p>
        <ul id="jobs" class="jobs-list"></ul>
      </div>
      <div class="card card-qr">
        <p class="muted">Entrar no sistema</p>
        <img id="qr" alt="QR code" class="qr-code" />
      </div>
      <details class="card card-logs" id="log-section" open>
        <summary>Logs do servidor</summary>
        <div class="log-controls">
          <select id="log-level">
            <option value="all">Todos</option>
            <option value="debug">debug</option>
            <option value="info">info</option>
            <option value="warn">warn</option>
            <option value="error">error</option>
          </select>
          <button type="button" id="log-clear">Limpar</button>
        </div>
        <div id="log-view" class="log-view"></div>
      </details>
    </div>
  </div>
  <script type="module" src="/assets/control.js"></script>
</body>
</html>
